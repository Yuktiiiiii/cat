<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hide & Seek — Find Kutchu</title>
    <meta name="description" content="A fun hide-and-seek game: find Kutchu among other cats." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%90%B1%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Fraunces:opsz,wght@9..144,650;750&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./game.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">🐾</span>
          <a class="brand-name" href="./index.html">Kutchu</a>
        </div>
        <nav class="nav" aria-label="Primary">
          <a href="./index.html#gallery">Back to gallery</a>
          <a href="./index.html">Home</a>
        </nav>
      </div>
    </header>

    <main id="main" class="game">
      <section class="section">
        <div class="container">
          <div class="section-head">
            <h2>Hide &amp; Seek: Find Kutchu</h2>
            <p>
              One card is <strong>Kutchu</strong>. The rest are other cats (your screenshots). Click the card you think is Kutchu.
            </p>
          </div>

          <div class="game-top">
            <div class="score">
              <div><span class="label">Attempts</span> <span id="attempts" class="value">0</span></div>
              <div><span class="label">Best</span> <span id="best" class="value">—</span></div>
            </div>
            <div class="game-actions">
              <button id="shuffleBtn" class="btn primary" type="button">Shuffle</button>
              <a class="btn ghost" href="./index.html">Exit</a>
            </div>
          </div>

          <div id="status" class="status" role="status" aria-live="polite"></div>

          <div id="grid" class="cat-grid" aria-label="Cat cards grid"></div>
        </div>
      </section>
    </main>

    <div id="winModal" class="lightbox" aria-hidden="true" role="dialog" aria-label="You found Kutchu">
      <div class="lightbox-backdrop" data-close="true"></div>
      <div class="win-card" role="document">
        <h3>You found Kutchu!</h3>
        <p id="winText" class="win-text"></p>
        <div class="win-actions">
          <button id="playAgainBtn" class="btn primary" type="button">Play again</button>
          <a class="btn ghost" href="./index.html">Back home</a>
        </div>
      </div>
    </div>

    <script id="gameData" type="application/json">
      {
        "kutchu": { "src": "hiii.jpeg", "label": "Kutchu" },
        "others": [
          "Screenshot 2026-06-02 131647.png",
          "Screenshot 2026-06-02 131656.png",
          "Screenshot 2026-06-02 131719.png",
          "Screenshot 2026-06-02 131754.png",
          "Screenshot 2026-06-02 131810.png"
        ]
      }
    </script>
    <script src="./game.js" defer></script>
  </body>
</html>
